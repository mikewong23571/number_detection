schema_version: 1

repo:
  url: https://github.com/mikewong23571/number_detection.git
  ref: master
  local_dir: /content/number_detection

runtime:
  workdir: .
  env:
    PYTHONUNBUFFERED: "1"

steps:
  install:
    - pip install -q uv
    - uv sync
  run:
    - uv run number-detection --epochs 1 --device cuda --max-train-samples 20000 --max-test-samples 5000
